<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Robot head -->
  <rect x="140" y="100" width="232" height="200" rx="30" fill="#e2e8f0"/>
  <!-- Eyes -->
  <circle cx="190" cy="190" r="35" fill="#1e3a5f"/>
  <circle cx="322" cy="190" r="35" fill="#1e3a5f"/>
  <circle cx="200" cy="185" r="12" fill="#fff"/>
  <circle cx="312" cy="185" r="12" fill="#fff"/>
  <!-- Smile -->
  <path d="M200 250 Q256 290 312 250" stroke="#1e3a5f" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Antenna -->
  <rect x="246" y="60" width="20" height="40" fill="#f59e0b"/>
  <circle cx="256" cy="50" r="15" fill="#f59e0b"/>
  <!-- Book in front -->
  <rect x="180" y="300" width="152" height="100" rx="10" fill="#fff"/>
  <rect x="190" y="310" width="132" height="20" fill="#3b82f6"/>
  <rect x="190" y="340" width="132" height="20" fill="#22c55e"/>
  <rect x="190" y="370" width="100" height="10" fill="#f59e0b"/>
